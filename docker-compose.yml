version: '3.8'

services:

  mysql:
    image: mysql:8
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_DATABASE: transaccional_novobanco
      MYSQL_ROOT_PASSWORD: bancoInternacionalTest26
      MYSQL_USER: davidBI
      MYSQL_PASSWORD: bancoInternacionalTest26
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build: .
    container_name: spring-app
    restart: always
    depends_on:
      - mysql
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/transaccional_novobanco?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: davidBI
      DB_PASSWORD: bancoInternacionalTest26
      SPRING_JPA_HIBERNATE_DDL_AUTO: create

volumes:
  mysql_data: